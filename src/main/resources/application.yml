spring:
  datasource:
    url: jdbc:mysql://localhost:3306/movietime?useSSL=false&serverTimezone=UTC
    username: root
    password: root@123   # change based on your local setup
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use 'validate' later in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080